server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ===== 统一门户网关 =====
  # /        门户首页（选择进 ERP 还是刀具系统）
  # /tools/  刀具库存系统（本容器内的 SPA）
  # /api/    刀具系统后端
  # /erp/    订单生产 ERP（反代到 cnc-erp 容器，需共享 docker 网络 factory-net）

  # 刀具系统 SPA（无路由，兜底回 index 以防万一）
  location /tools/ {
    try_files $uri $uri/ /tools/index.html;
  }

  # 刀具系统 API
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ERP 反代：ERP 原生支持 /erp 前缀，原样透传；
  # 用变量 + docker 内置 DNS，避免 ERP 容器未启动时 nginx 起不来
  location /erp {
    resolver 127.0.0.11 valid=10s;
    set $erp_upstream cnc-erp:3000;
    proxy_pass http://$erp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 60m;   # ERP 图纸/PDF 附件上限 50MB
    proxy_read_timeout 120s;    # PDF 识别/OCR 可能较慢
  }

  # 门户首页 + 其余路径兜底到门户
  location / {
    try_files $uri $uri/ /index.html;
  }
}
